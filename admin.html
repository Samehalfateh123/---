<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- القائمة الجانبية -->
        <aside class="sidebar">
            <div class="logo-section">
                <h2>🎛️ لوحة التحكم</h2>
            </div>
            <nav class="menu">
                <a href="#" class="menu-item active" onclick="switchTab('create'); return false;">➕ إنشاء</a>
                <a href="#" class="menu-item" onclick="switchTab('view'); return false;">📋 عرض</a>
                <a href="archive.html" class="menu-item">📦 أرشيف</a>
            </nav>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="main-content">
            <!-- تاب الإنشاء -->
            <div id="create" class="tab-content active">
                <h1>إنشاء تعميم جديد</h1>
                <form id="noticeForm" class="form-container">
                    <section class="form-section">
                        <h2>المعلومات الأساسية</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label>رقم التعميم *</label>
                                <input type="text" id="noticeNo" required placeholder="TZ-2024-001">
                            </div>
                            <div class="form-group">
                                <label>التاريخ *</label>
                                <input type="date" id="noticeDate" required>
                            </div>
                            <div class="form-group">
                                <label>الشركة *</label>
                                <input type="text" id="company" required>
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2>البيانات التنظيمية</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label>الفرع *</label>
                                <input type="text" id="branch" required>
                            </div>
                            <div class="form-group">
                                <label>المشرف *</label>
                                <input type="text" id="supervisor" required>
                            </div>
                            <div class="form-group">
                                <label>المدير *</label>
                                <input type="text" id="manager" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>الهاتف *</label>
                                <input type="tel" id="phone" required>
                            </div>
                            <div class="form-group">
                                <label>معتمد من *</label>
                                <input type="text" id="approvedBy" required>
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2>ساعات العمل</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label>أيام الأسبوع *</label>
                                <input type="text" id="weekday" required placeholder="الاثنين - الجمعة 09:00 - 17:00">
                            </div>
                            <div class="form-group">
                                <label>نهاية الأسبوع *</label>
                                <input type="text" id="weekend" required placeholder="السبت والأحد مغلق">
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2>محتوى التعميم</h2>
                        <div class="form-group full-width">
                            <label>العنوان *</label>
                            <input type="text" id="title" required>
                        </div>
                        <div class="form-group full-width">
                            <label>المحتوى *</label>
                            <textarea id="content" required rows="8"></textarea>
                        </div>

                        <div class="form-group full-width">
                            <label>بنود التعميم (يمكن الإضافة/الحذف والتخصيص)</label>
                            <div id="itemsContainer" class="items-container"></div>
                            <div style="margin-top:8px;">
                                <button type="button" id="addItemBtn" class="btn">➕ إضافة بند</button>
                            </div>
                        </div>

                        <div class="form-group full-width">
                            <label>تحميل ملف Excel كمرفق (سيتم تحويله لجدول تلقائي)</label>
                            <input type="file" id="excelFile" accept=".xlsx,.xls">
                            <div id="excelPreview" style="margin-top:10px;"></div>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2>التصميم والألوان</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label>لون الموضوع</label>
                                <input type="color" id="themeColor" value="#007bff">
                            </div>
                            <div class="form-group">
                                <label>شعار الشركة (رابط) *</label>
                                <input type="url" id="logo" required>
                            </div>
                            <div class="form-group">
                                <label>صورة التعميم (رابط)</label>
                                <input type="url" id="noticeImage">
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <h2>رابط وQR</h2>
                        <div class="form-group full-width">
                            <label>رابط خارجي داخل التعميم (اختياري)</label>
                            <input type="url" id="externalLink" placeholder="https://example.com">
                        </div>
                        <div class="form-group full-width">
                            <label>رابط QR (سيتم تحويله لصورة QR)</label>
                            <input type="url" id="qrCode" placeholder="https://example.com">
                        </div>
                    </section>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">💾 حفظ وإنشاء رابط قابل للمشاركة</button>
                        <button type="reset" class="btn btn-secondary">🔄 إعادة تعيين</button>
                    </div>
                </form>
            </div>

            <!-- تاب العرض -->
            <div id="view" class="tab-content">
                <h1>قائمة التعاميم</h1>
                <div class="search-bar">
                    <input type="text" id="searchNotice" placeholder="ابحث عن تعميم...">
                </div>
                <div id="noticesList" class="notices-list">
                    <p>جاري التحميل...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- مكتبات خارجية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
