<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف التعاميم</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/archive.css">
</head>
<body>
    <div class="archive-container">
        <!-- Header -->
        <header class="archive-header">
            <h1>📚 أرشيف التعاميم</h1>
            <p>قائمة بجميع التعاميم المحفوظة</p>
        </header>

        <!-- Search & Filter Section -->
        <div class="search-filter-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 ابحث عن تعميم...">
            </div>
            
            <div class="filter-section">
                <select id="companyFilter">
                    <option value="">-- جميع الشركات --</option>
                </select>
                
                <input type="date" id="dateFromFilter">
                <input type="date" id="dateToFilter">
                
                <button id="resetFilters" class="btn-reset">🔄 إعادة تعيين</button>
            </div>
        </div>

        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-card">
                <span class="stat-label">إجمالي التعاميم</span>
                <span class="stat-value" id="totalNotices">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">الشركات</span>
                <span class="stat-value" id="totalCompanies">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">أحدث تعميم</span>
                <span class="stat-value" id="latestNotice">--</span>
            </div>
        </div>

        <!-- Archive List -->
        <div class="archive-list-section">
            <div id="archiveList" class="archive-list">
                <div class="empty-state">
                    <p>📭 لا توجد تعاميم محفوظة حتى الآن</p>
                </div>
            </div>
        </div>

        <!-- Modal for Viewing Notice -->
        <div id="noticeModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">عرض التعميم</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div id="modalBody" class="modal-body"></div>
                <div class="modal-footer">
                    <button id="modalDownloadBtn" class="btn btn-primary">📄 تحميل PDF</button>
                    <button id="modalDeleteBtn" class="btn btn-danger">🗑️ حذف</button>
                    <button id="modalCloseBtn" class="btn btn-secondary">إغلاق</button>
                </div>
            </div>
        </div>

        <!-- Back Button -->
        <div class="navigation">
            <a href="admin.html" class="btn btn-back">← العودة للوحة التحكم</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/archive.js"></script>
</body>
</html>
